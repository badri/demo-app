name: VMKit Deploy
"on":
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        type: string
      dest:
        description: Deployment destination
        required: true
        type: string
      instance_id:
        description: VMKit instance ID
        required: true
        type: string
      action:
        description: Deploy action (deploy, rollback)
        required: false
        default: deploy
        type: string
env:
  DEST: ${{ inputs.dest }}
  SERVICE: demo-app-${{ inputs.dest }}
  REGISTRY: ghcr.io
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ghcr.io/badri/demo-app:${{ github.sha }},ghcr.io/badri/demo-app:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Install Kamal
      run: sudo gem install kamal
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.VMKIT_SSH_PRIVATE_KEY }}
    - name: Resolve VM host
      id: resolve
      run: |
        HOST=$(curl -sf -H "Authorization: Bearer ${{ secrets.VMKIT_SERVICE_KEY }}" "https://gateway.vmkit.dev/api/internal/instances/${{ inputs.instance_id }}/host")
        echo "host=$HOST" >> "$GITHUB_OUTPUT"
        ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
    - name: Render Kamal secrets
      run: envsubst < .kamal/secrets.${DEST}.tpl > .kamal/secrets
      env:
        DEST_VM_HOST: ${{ steps.resolve.outputs.host }}
        KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    - name: Deploy with Kamal
      run: kamal deploy -d ${{ inputs.dest }}
      env:
        DEST_VM_HOST: ${{ steps.resolve.outputs.host }}
    - name: Report deployed URL
      if: always()
      run: |
        curl -sf -X PATCH \
          -H "Authorization: Bearer ${{ secrets.VMKIT_SERVICE_KEY }}" \
          -H "Content-Type: application/json" \
          "https://gateway.vmkit.dev/api/internal/deploys/by-run/${{ github.run_id }}/url" \
          -d "{\"url\": \"https://${{ steps.resolve.outputs.host }}\"}" || true
