service: demo-app-staging
image: badri/demo-app
ssh:
  user: kamal
builder:
  arch: arm64
servers:
  web:
    hosts:
    - $DEST_VM_HOST
proxy:
  ssl: true
  host: demo-app-staging.vmkit.app
  app_port: 8000
  healthcheck:
    path: /health
    interval: 3
    timeout: 30
registry:
  server: ghcr.io
  username: vmkit-deploy[bot]
  password:
  - KAMAL_REGISTRY_PASSWORD
